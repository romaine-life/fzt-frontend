apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: fzt-frontend
  namespace: fzt-frontend
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main
    namespace: envoy-gateway-system
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: fzt-frontend.romaine.life
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: fzt-frontend-tls
