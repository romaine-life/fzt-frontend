name: Release

# Auto-trigger disabled — Claude-driven CI. Run manually via
# `gh workflow run release.yml -R romaine-life/fzt-frontend` when ready
# to cut a tag. Downstream consumers are updated manually per repo.

on:
  workflow_dispatch:

# Shared with dispatch.yml: release-cutting is serialized, preventing two
# workflows from computing the same patch number simultaneously.
concurrency:
  group: release-tag
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  release:
    uses: romaine-life/pipeline-templates/.github/workflows/release-and-dispatch-template.yml@main
