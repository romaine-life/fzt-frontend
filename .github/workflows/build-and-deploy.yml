name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - Dockerfile
      - .dockerignore
      - k8s/**
      - .github/workflows/build-and-deploy.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image, push, bump kustomization tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name romainecr

      - name: Build and push image
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="romainecr.azurecr.io/fzt-frontend:${TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Install kustomize
        # Pinned direct download — the upstream install script hits the
        # GitHub API (unauthenticated → 60/hr rate limit) which intermittently
        # returns garbage, breaking the tarball extract.
        run: |
          KUSTOMIZE_VERSION=v5.8.1
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | sudo tar -xz -C /usr/local/bin/

      - name: Bump image tag in k8s/values.yaml
        run: |
          sed -i "s|^  tag: .*|  tag: ${{ env.TAG }}|" k8s/values.yaml

      - name: Commit and push tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/values.yaml
          if git diff --cached --quiet; then
            echo "No values changes to commit"
            exit 0
          fi
          git commit -m "chore: bump fzt-frontend image to ${{ env.TAG }} [skip ci]"
          git push
