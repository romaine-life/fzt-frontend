name: Dependency Update

# Auto-trigger disabled — Claude-driven CI. Run manually via
# `gh workflow run dispatch.yml -R romaine-life/fzt-frontend` when ready
# to bump go.mod + cut a release. Downstream consumers are updated
# manually per repo.
on:
  workflow_dispatch:

# The called reusable workflow declares contents:write + actions:write.
# The template uses id-token:write for the Azure OIDC step that fetches the
# GitHub App credentials from Key Vault for the downstream dispatch.
permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  # Shared with release.yml so tag-cutting is serialized across dep-update
  # and direct-push release paths (prevents patch-number races).
  group: release-tag
  cancel-in-progress: false

jobs:
  update:
    uses: romaine-life/pipeline-templates/.github/workflows/go-dependency-update-template.yml@main
    with:
      modules: github.com/romaine-life/fzt
      # Template handles bump + commit + push + cut release in one atomic
      # job. Downstream (fzt-terminal, fzt-automate, fzt-browser, fzt-
      # picker) is Claude-driven — no repository_dispatch fan-out.
